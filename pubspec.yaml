name: pix
description: Pixap — нативное мобильное приложение-обёртка для pixapp.kz
publish_to: "none"
version: 1.0.0+6

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # WebView — flutter_inappwebview выбран за:
  # - полная поддержка localStorage/sessionStorage/cookies
  # - нативный JS bridge (addJavaScriptHandler, callAsyncJavaScript)
  # - onShowFileChooser для загрузки файлов из WebView
  # - гибкая настройка (mixed content, cache, user agent)
  # - активная поддержка и частые обновления
  flutter_inappwebview: ^6.1.5

  # Firebase (Push)
  firebase_core: ^3.15.2
  firebase_messaging: ^15.0.0

  # Разрешения
  permission_handler: ^11.1.0

  # Геолокация
  geolocator: ^10.1.0

  # Медиа и файлы
  image_picker: ^1.0.7
  file_picker: ^8.1.2

  # Ссылки и устройство
  url_launcher: ^6.2.2
  device_info_plus: ^9.1.1

  # Сеть и состояние
  connectivity_plus: ^5.0.2

  # Утилиты
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
