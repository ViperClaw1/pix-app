name: pix
description: PIX — нативное мобильное приложение-обёртка для pixapp.kz
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # WebView — flutter_inappwebview выбран за:
  # - полная поддержка localStorage/sessionStorage/cookies
  # - нативный JS bridge (addJavaScriptHandler, callAsyncJavaScript)
  # - onShowFileChooser для загрузки файлов из WebView
  # - гибкая настройка (mixed content, cache, user agent)
  # - активная поддержка и частые обновления
  flutter_inappwebview: ^6.0.0

  # Firebase (Push)
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9

  # Разрешения
  permission_handler: ^11.1.0

  # Геолокация
  geolocator: ^10.1.0

  # Медиа и файлы
  image_picker: ^1.0.7
  file_picker: ^6.1.1

  # Ссылки и устройство
  url_launcher: ^6.2.2
  device_info_plus: ^9.1.1

  # Сеть и состояние
  connectivity_plus: ^5.0.2

  # Утилиты
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
